name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: alire-project/setup-alire@v3

      - run: alr build

      - uses: actions/upload-artifact@v4
        with:
          name: udp_sender-${{ matrix.os }}
          path: bin/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: udp_sender-macos-latest
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: udp_sender-windows-latest
          path: windows

      - run: |
          tar czf udp_sender-macos.tar.gz -C macos .
          cd windows && zip -r ../udp_sender-windows.zip . && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            udp_sender-macos.tar.gz
            udp_sender-windows.zip
